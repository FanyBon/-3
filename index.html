<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💜</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh;
      background:linear-gradient(160deg,#ecdeff 0%,#dcc5ff 50%,#ceb2f5 100%);
      font-family:'Quicksand',sans-serif;
      overflow-x:hidden;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
    }

    .bg-blob {
      position:fixed; border-radius:50%; pointer-events:none; z-index:0;
      animation:blobFloat ease-in-out infinite;
    }
    @keyframes blobFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-26px);} }

    .scene {
      position:relative; z-index:10;
      display:flex; flex-direction:column;
      align-items:center; gap:28px; padding:40px 20px;
    }

    .title {
      font-family:'Playfair Display',serif;
      font-size:clamp(1.4rem,5vw,2rem);
      color:#56268a;
      letter-spacing:.06em; text-align:center;
      opacity:0; animation:fadeDown 1s ease forwards .3s;
      text-shadow:0 2px 10px rgba(160,90,240,.16);
    }
    @keyframes fadeDown {
      from{opacity:0;transform:translateY(-18px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* Cloud envelope */
    .envelope-wrap {
      opacity:0; animation:fadeDown 1s ease forwards .6s;
      display:flex; flex-direction:column;
      align-items:center; gap:14px;
    }
    .cloud-env {
      position:relative; width:280px; height:200px;
      cursor:pointer;
      filter:drop-shadow(0 8px 28px rgba(150,80,230,.28));
      transition:transform .3s, filter .3s;
    }
    .cloud-env:hover {
      transform:translateY(-6px) scale(1.03);
      filter:drop-shadow(0 14px 40px rgba(150,80,230,.45));
    }
    .env-heart {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-56%);
      font-size:5.5rem; line-height:1; z-index:5;
      pointer-events:none;
      animation:hbeat 1.6s ease infinite;
      filter:drop-shadow(0 0 14px rgba(190,80,255,.55));
    }
    @keyframes hbeat {
      0%,100%{transform:translate(-50%,-56%) scale(1);}
      40%{transform:translate(-50%,-56%) scale(1.18);}
      65%{transform:translate(-50%,-56%) scale(1.1);}
    }
    .env-hint {
      font-size:.82rem; color:#7a45b0;
      letter-spacing:.12em; text-align:center;
      animation:pulse 2.2s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.5;} 50%{opacity:1;} }

    /* Letter overlay */
    .carta-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(140,80,220,.18);
      z-index:100; align-items:center; justify-content:center;
      backdrop-filter:blur(10px);
    }
    .carta-overlay.visible { display:flex; }

    .carta-card {
      background:linear-gradient(145deg,#faf4ff,#f0e4ff);
      border-radius:26px; padding:40px 36px 32px;
      max-width:420px; width:90%;
      position:relative;
      box-shadow:0 0 70px rgba(160,90,240,.22), 0 20px 50px rgba(100,40,160,.15);
      animation:cardPop .5s cubic-bezier(.175,.885,.32,1.275) forwards;
      border:1.5px solid rgba(180,120,255,.35);
    }
    @keyframes cardPop {
      from{opacity:0;transform:scale(.7) rotate(-3deg);}
      to{opacity:1;transform:scale(1) rotate(0);}
    }

    .carta-lines {
      position:absolute; inset:0; pointer-events:none;
      overflow:hidden; border-radius:26px;
    }
    .carta-lines::before {
      content:''; position:absolute;
      top:80px; left:32px; right:32px; bottom:32px;
      background:repeating-linear-gradient(
        transparent, transparent 28px,
        rgba(160,90,220,.1) 28px, rgba(160,90,220,.1) 29px
      );
    }

    .carta-title {
      font-family:'Playfair Display',serif;
      font-size:1.45rem; color:#55278a;
      margin-bottom:20px; text-align:center;
    }

    #texto-carta {
      font-family:'Playfair Display',serif;
      font-size:1rem; color:#3d1070;
      line-height:1.9;
      position:relative; z-index:1;
      max-height:220px;
      overflow-y:auto;
      padding-right:8px;
      scrollbar-width:thin;
      scrollbar-color:#c49af5 transparent;
    }
    #texto-carta::-webkit-scrollbar { width:4px; }
    #texto-carta::-webkit-scrollbar-track { background:transparent; }
    #texto-carta::-webkit-scrollbar-thumb { background:#c49af5; border-radius:10px; }

    .cursor-blink {
      display:inline-block; width:2px; height:1em;
      background:#9b5cd4;
      animation:blink .8s step-end infinite;
      vertical-align:text-bottom; margin-left:1px;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

    .carta-actions {
      display:flex; justify-content:space-between; align-items:center;
      margin-top:28px; padding-top:16px;
      border-top:1px solid rgba(160,90,220,.15);
    }

    .btn-sorpresa {
      background:none; border:none;
      font-size:2.4rem; cursor:pointer;
      animation:hbeat 1.8s ease infinite;
      filter:drop-shadow(0 0 8px rgba(200,80,255,.45));
      transition:transform .2s;
      line-height:1;
    }
    .btn-sorpresa:hover { transform:scale(1.3); }

    /* Fixed mystery button */
    .btn-misterio {
      width:58px; height:58px; border-radius:50%;
      border:2.5px solid #b580e8;
      background:linear-gradient(135deg,#f0deff,#e2c8ff);
      cursor:pointer; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:1px;
      transition:all .3s;
      box-shadow:0 4px 16px rgba(160,90,240,.2);
      font-size:1.4rem;
      line-height:1;
    }
    .btn-misterio:hover {
      border-color:#c49af5;
      box-shadow:0 0 24px rgba(160,90,240,.45);
      transform:scale(1.1);
    }
    .btn-misterio-q {
      font-size:.65rem; font-weight:700;
      color:#6040a0; line-height:1;
      font-family:'Quicksand',sans-serif;
    }

    .carta-close {
      position:absolute; top:14px; right:18px;
      background:none; border:none;
      font-size:1.3rem; color:#a070cc;
      cursor:pointer; transition:transform .2s;
      line-height:1;
    }
    .carta-close:hover { transform:scale(1.3) rotate(90deg); }

    /* Hearts — z 9999 */
    .heart-float {
      position:fixed; pointer-events:none; z-index:9999;
      animation:floatUp linear forwards;
    }
    @keyframes floatUp {
      0%{opacity:1;transform:translateY(0) rotate(-8deg);}
      50%{opacity:1;transform:translateY(-50vh) rotate(8deg);}
      100%{opacity:0;transform:translateY(-110vh);}
    }

    .deco-h {
      position:fixed; opacity:.1; pointer-events:none; z-index:1;
      animation:floatSlow linear infinite;
    }
    @keyframes floatSlow {
      from{transform:translateY(110vh);}
      to{transform:translateY(-20vh);}
    }
  </style>
</head>
<body>

<div class="bg-blob" style="width:320px;height:320px;background:rgba(210,170,255,.28);top:-90px;left:-90px;animation-duration:9s;"></div>
<div class="bg-blob" style="width:220px;height:220px;background:rgba(190,140,255,.2);bottom:30px;right:-50px;animation-duration:12s;animation-delay:3s;"></div>
<div id="decoHearts"></div>

<div class="scene">
  <h1 class="title">💜</h1>

  <div class="envelope-wrap">
    <div class="cloud-env" id="cloudBtn">
      <svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg" width="280" height="200">
        <path d="
          M 56 158 Q 22 158 22 128 Q 22 108 42 100
          Q 38 90 44 80 Q 50 60 72 58
          Q 72 36 96 30 Q 118 24 132 44
          Q 144 28 166 28 Q 192 28 200 50
          Q 218 44 228 60 Q 244 58 250 76
          Q 266 80 264 100 Q 264 122 246 130
          Q 250 152 230 156 Q 214 164 198 156
          Q 184 166 166 162 Q 150 170 132 164
          Q 116 172 100 164 Q 80 170 66 160
          Q 56 162 56 158 Z
        " fill="#ecdeff" stroke="#c49af5" stroke-width="2.5" stroke-linejoin="round"/>
        <line x1="84"  y1="114" x2="196" y2="114" stroke="#c090e8" stroke-width="1.8" stroke-linecap="round" opacity=".45"/>
        <line x1="84"  y1="128" x2="196" y2="128" stroke="#c090e8" stroke-width="1.8" stroke-linecap="round" opacity=".45"/>
        <line x1="84"  y1="142" x2="158" y2="142" stroke="#c090e8" stroke-width="1.8" stroke-linecap="round" opacity=".45"/>
      </svg>
      <div class="env-heart">💜</div>
    </div>
    <p class="env-hint">✦ toca el corazón ✦</p>
  </div>
</div>

<!-- Letter overlay -->
<div class="carta-overlay" id="cartaOverlay">
  <div class="carta-card">
    <button class="carta-close" id="btnClose">✕</button>
    <div class="carta-lines"></div>
    <h2 class="carta-title">Por si lo olvidaste...</h2>
    <p id="texto-carta"><span class="cursor-blink"></span></p>
    <div class="carta-actions">
      <button class="btn-sorpresa" id="btnCorazones">💜</button>
      <span style="font-size:.75rem;color:#7a45b0;font-style:italic;text-align:center;line-height:1.5;">
        toca el 💜<br>o el misterio →
      </span>
      <button class="btn-misterio" id="btnJuego">
        <span>💜</span>
        <span class="btn-misterio-q">?</span>
      </button>
    </div>
  </div>
</div>

<script>
  /* Deco bg hearts */
  const deco = document.getElementById('decoHearts');
  for (let i=0;i<10;i++){
    const h=document.createElement('div'); h.className='deco-h'; h.textContent='💜';
    h.style.cssText=`left:${Math.random()*100}%;animation-duration:${14+Math.random()*14}s;animation-delay:${Math.random()*14}s;font-size:${1.5+Math.random()*2.5}rem;`;
    deco.appendChild(h);
  }

  /* Buttons wired with addEventListener (no onclick) */
  document.getElementById('cloudBtn').addEventListener('click', abrirCarta);
  document.getElementById('btnClose').addEventListener('click', cerrarCarta);
  document.getElementById('btnCorazones').addEventListener('click', lanzarCorazones);
  document.getElementById('btnJuego').addEventListener('click', function() {
    window.location.href = 'juego.html';
  });

  /* Typewriter */
  const mensaje = "A pesar de todo, y aunque a veces no sepa demostrar bien cuánto te aprecio, me gusta tenerte conmigo. Sin darte cuenta, te has vuelto lo que más amo de mis días.\n\nMe duele verte estresado o con sentimientos negativos; si pudiera, te los quitaría y me los pondría yo, porque odio verte así.\n\nLamento mucho las peleas y discusiones que hemos tenido, de verdad quisiera que las cosas no estuvieran así entre nosotros. Y aunque me duele siquiera pensarlo, si en algún momento quieres que ya no esté más en tu vida, solo te pido que me lo digas plis.";
  let idx = 0, typing = false;

  function abrirCarta() {
    document.getElementById('cartaOverlay').classList.add('visible');
    if (!typing && idx === 0) { typing = true; setTimeout(escribir, 400); }
  }

  function cerrarCarta() {
    document.getElementById('cartaOverlay').classList.remove('visible');
  }

  function escribir() {
    const el = document.getElementById('texto-carta');
    if (idx < mensaje.length) {
      el.innerHTML = mensaje.substring(0,idx+1).replace(/\n/g,'<br>') + '<span class="cursor-blink"></span>';
      idx++;
      setTimeout(escribir, mensaje[idx-1]==='\n' ? 200 : 45);
    } else {
      el.innerHTML = mensaje.replace(/\n/g,'<br>');
    }
  }

  /* Hearts — z 9999, only 💜 */
  function lanzarCorazones() {
    for (let i=0;i<60;i++){
      setTimeout(()=>{
        const h=document.createElement('div'); h.className='heart-float'; h.textContent='💜';
        const size=1.2+Math.random()*2;
        h.style.cssText=`left:${Math.random()*98}vw;bottom:${Math.random()*15}px;font-size:${size}rem;animation-duration:${2.2+Math.random()*3}s;animation-delay:${Math.random()*.6}s;`;
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6500);
      }, i*35);
    }
  }
</script>
</body>
</html>
