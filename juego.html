<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini juego 💜</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh;
      background:linear-gradient(160deg,#ecdeff 0%,#dcc5ff 50%,#ceb2f5 100%);
      font-family:'Quicksand',sans-serif;
      overflow-x:hidden;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:20px;
    }
    .bg-blob {
      position:fixed; border-radius:50%; pointer-events:none; z-index:0;
      animation:blobFloat ease-in-out infinite;
    }
    @keyframes blobFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-24px);} }

    .scene {
      position:relative; z-index:10;
      display:flex; flex-direction:column;
      align-items:center; gap:20px;
      max-width:560px; width:100%;
    }
    h1 {
      font-family:'Playfair Display',serif;
      font-size:clamp(1.2rem,5vw,1.8rem);
      color:#56268a; text-align:center;
      animation:fadeDown .8s ease forwards;
    }
    .subtitle {
      font-size:.88rem; color:#7a45b0;
      text-align:center; letter-spacing:.06em;
      animation:fadeDown .8s ease .2s both;
    }
    @keyframes fadeDown {
      from{opacity:0;transform:translateY(-14px);}
      to{opacity:1;transform:translateY(0);}
    }

    .hearts-grid {
      display:flex; flex-wrap:wrap;
      justify-content:center; gap:16px;
      animation:fadeDown .8s ease .4s both;
    }
    .heart-btn {
      width:84px; height:84px;
      border:2.5px solid #c49af5;
      border-radius:50%;
      background:linear-gradient(135deg,#f0deff,#e2c8ff);
      font-size:2.4rem;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:transform .25s, box-shadow .25s;
      box-shadow:0 4px 18px rgba(160,90,230,.22);
      animation:hbeat 2s ease infinite;
    }
    .heart-btn:nth-child(1){animation-delay:0s;}
    .heart-btn:nth-child(2){animation-delay:.3s;}
    .heart-btn:nth-child(3){animation-delay:.6s;}
    .heart-btn:nth-child(4){animation-delay:.9s;}
    .heart-btn:nth-child(5){animation-delay:1.2s;}
    @keyframes hbeat { 0%,100%{transform:scale(1);} 50%{transform:scale(1.09);} }
    .heart-btn:hover { transform:scale(1.2)!important; box-shadow:0 0 34px rgba(160,90,240,.55); border-color:#a97de0; }
    .heart-btn.shake { animation:shake .4s ease!important; }
    @keyframes shake {
      0%,100%{transform:translateX(0);}
      20%{transform:translateX(-8px) rotate(-5deg);}
      40%{transform:translateX(8px) rotate(5deg);}
      60%{transform:translateX(-5px);}
      80%{transform:translateX(5px);}
    }
    .heart-btn:disabled { cursor:default; }

    .msg-wrong {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:linear-gradient(135deg,#f0deff,#e0c8ff);
      border:2px solid #c49af5; border-radius:18px;
      padding:18px 30px; color:#55278a;
      font-size:1rem; text-align:center;
      z-index:500;
      box-shadow:0 0 40px rgba(160,90,240,.3);
      animation:popIn .3s cubic-bezier(.175,.885,.32,1.275) forwards;
      pointer-events:none;
    }
    @keyframes popIn {
      from{opacity:0;transform:translate(-50%,-50%) scale(.6);}
      to{opacity:1;transform:translate(-50%,-50%) scale(1);}
    }

    .win-overlay {
      display:none; position:fixed; inset:0;
      z-index:300;
      flex-direction:column;
      align-items:center; justify-content:center;
      gap:10px;
      background:rgba(120,60,200,.08);
      backdrop-filter:blur(6px);
    }
    .win-overlay.visible { display:flex; }

    .win-msg {
      font-family:'Playfair Display',serif;
      font-size:1.35rem; color:#55278a;
      text-align:center;
      background:rgba(255,255,255,.8);
      border-radius:20px; padding:14px 26px;
      box-shadow:0 4px 24px rgba(160,90,240,.2);
      animation:fadeDown .6s ease .2s both;
      position:relative; z-index:10;
    }

    .mono-stage {
      position:relative;
      width:min(360px,90vw);
      height:280px;
      z-index:10;
    }

    .mono-wrap {
      position:absolute;
      transition:all 1.4s cubic-bezier(.34,1.56,.64,1);
    }

    #mono-nino  { top:20px; left:-160px; opacity:0; }
    #mono-nina  { bottom:20px; right:-160px; opacity:0; }
    #mono-nino.go  { left:10px; opacity:1; top:30px; }
    #mono-nina.go  { right:10px; opacity:1; bottom:30px; }

    @keyframes wiggle {
      0%,100%{transform:rotate(0deg);}
      20%{transform:rotate(-8deg);}
      40%{transform:rotate(8deg);}
      60%{transform:rotate(-5deg);}
      80%{transform:rotate(5deg);}
    }
    .mono-wrap.wiggle { animation:wiggle .5s ease; }

    @keyframes bounce {
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-16px);}
    }
    .mono-wrap.bouncing { animation:bounce .55s ease infinite; }

    .heart-screen {
      position:fixed; inset:0; z-index:9000;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
      opacity:0;
    }
    .heart-screen.active { opacity:1; }

    .heart-screen-emoji {
      font-size:4rem;
      filter:drop-shadow(0 0 40px rgba(200,80,255,1));
    }

    @keyframes heartGrowFull {
      0%   { transform:scale(1);   opacity:1; filter:drop-shadow(0 0 40px rgba(200,80,255,1));}
      30%  { transform:scale(8);   opacity:1; filter:drop-shadow(0 0 80px rgba(200,80,255,1));}
      55%  { transform:scale(18);  opacity:1; filter:drop-shadow(0 0 120px rgba(200,80,255,1));}
      70%  { transform:scale(28);  opacity:.9; filter:drop-shadow(0 0 180px rgba(255,100,255,1));}
      85%  { transform:scale(38);  opacity:.7; filter:drop-shadow(0 0 220px rgba(255,80,180,1));}
      92%  { transform:scale(44);  opacity:.4;}
      100% { transform:scale(50);  opacity:0;}
    }
    .heart-screen-emoji.grow { animation:heartGrowFull 2.4s cubic-bezier(.22,1,.36,1) forwards; }

    .pulse-ring {
      position:fixed; inset:0; z-index:8999;
      pointer-events:none;
      background:radial-gradient(circle at 50% 50%, rgba(220,100,255,0.6) 0%, transparent 70%);
      opacity:0; transform:scale(0);
    }
    .pulse-ring.boom { animation:ringBoom 2.4s ease forwards; }
    @keyframes ringBoom {
      0%  {opacity:0; transform:scale(0);}
      20% {opacity:.8; transform:scale(.5);}
      50% {opacity:.6; transform:scale(1);}
      80% {opacity:.3; transform:scale(1.5);}
      100%{opacity:0; transform:scale(2);}
    }

    .particula {
      position:fixed; pointer-events:none;
      font-size:1.6rem; z-index:9998;
      animation:explotar linear forwards;
    }
    @keyframes explotar {
      from{opacity:1;transform:translate(0,0) scale(1);}
      50%{opacity:1; transform:var(--mid) scale(1.4);}
      to{opacity:0;transform:var(--dest) scale(.4);}
    }

    .heart-float {
      position:fixed; pointer-events:none; z-index:9999;
      animation:floatUp linear forwards;
    }
    @keyframes floatUp {
      0%  {opacity:1;transform:translateY(0) rotate(-6deg);}
      50% {opacity:1;transform:translateY(-50vh) rotate(6deg);}
      100%{opacity:0;transform:translateY(-110vh);}
    }

    .deco-h {
      position:fixed; opacity:.1; pointer-events:none; z-index:1;
      animation:floatSlow linear infinite;
    }
    @keyframes floatSlow {
      from{transform:translateY(110vh);}
      to{transform:translateY(-20vh);}
    }

    .heart-eye { display:none; }
    .mono-wrap.met .heart-eye { display:block; }
    .mono-wrap.met .normal-eye { display:none; }
  </style>

  for (let i=0;i<10;i++){
    const h=document.createElement('div'); h.className='deco-h'; h.textContent='💜';
    h.style.cssText=`left:${Math.random()*100}%;animation-duration:${14+Math.random()*14}s;animation-delay:${Math.random()*14}s;font-size:${1.5+Math.random()*2.5}rem;`;
    deco.appendChild(h);
  }

  // ✅ FIX: mensajes mezclados al azar para que cada ronda sea distinta
  const mensajesBase = [
    "¡Ganaste! 💜 Recuerda que te amo muchooo",
    "¡Sí! 🥰 Y tú eres todo para mí.",
    "¡Correcto! 💜 Eres mi persona favorita.",
    "¡Ese era! 💜 Mi corazón siempre te elige a ti :(",
    "¡Lo lograste! 💜 Gracias por existir, nene.",

  ];

  // Baraja los mensajes una vez al cargar — así nunca se repite el orden
  const mensajes = [...mensajesBase].sort(() => Math.random() - 0.5);
  let ronda = 0;

  const grid = document.getElementById('heartsGrid');
  let winIndex = 0, bloqueado = false;

  function buildGrid() {
    grid.innerHTML = '';
    bloqueado = false;
    winIndex = Math.floor(Math.random() * 5);
    for (let i=0;i<5;i++){
      const btn = document.createElement('button');
      btn.className = 'heart-btn';
      btn.textContent = '💜';
      const idx = i;
      btn.addEventListener('click', function() {
        if (bloqueado) return;
        clickHeart(idx, btn);
      });
      grid.appendChild(btn);
    }
  }

  function clickHeart(idx, btn) {
    if (idx === winIndex) {
      bloqueado = true;
      ganar();
    } else {
      btn.classList.add('shake');
      btn.style.opacity = '.4';
      btn.disabled = true;
      setTimeout(() => btn.classList.remove('shake'), 400);
      showWrong();
    }
  }

  function showWrong() {
    const msgs = ['¡Intenta otra vez! 😝','Ese no era… 🙈','Casi… sigue buscando 💫','¡Sigue! 😜'];
    const el = document.createElement('div');
    el.className = 'msg-wrong';
    el.textContent = msgs[Math.floor(Math.random()*msgs.length)];
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }

  function ganar() {
    for (let i=0;i<65;i++){
      setTimeout(()=>{
        const h=document.createElement('div'); h.className='heart-float'; h.textContent='💜';
        const size=1.2+Math.random()*2;
        h.style.cssText=`left:${Math.random()*98}vw;bottom:${Math.random()*15}px;font-size:${size}rem;animation-duration:${2.2+Math.random()*3}s;animation-delay:${Math.random()*.6}s;`;
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6500);
      }, i*35);
    }

    // ✅ FIX: asignar mensaje ANTES de incrementar, y ciclar correctamente
    document.getElementById('winMsg').textContent = mensajes[ronda % mensajes.length];
    ronda++;

    const overlay = document.getElementById('winOverlay');
    overlay.classList.add('visible');

    setTimeout(() => {
      document.getElementById('mono-nino').classList.add('go');
      document.getElementById('mono-nina').classList.add('go');
    }, 200);

    setTimeout(() => {
      document.getElementById('mono-nino').classList.add('wiggle');
      document.getElementById('mono-nina').classList.add('wiggle');
    }, 1700);

    setTimeout(() => {
      document.getElementById('mono-nino').classList.add('met');
      document.getElementById('mono-nina').classList.add('met');
    }, 2000);

    setTimeout(() => {
      document.getElementById('mono-nino').classList.remove('wiggle');
      document.getElementById('mono-nina').classList.remove('wiggle');
      document.getElementById('mono-nino').classList.add('bouncing');
      document.getElementById('mono-nina').classList.add('bouncing');
    }, 2200);

    setTimeout(() => {
      const screen = document.getElementById('heartScreen');
      const emoji  = document.getElementById('heartScreenEmoji');
      const ring   = document.getElementById('pulseRing');
      screen.classList.add('active');
      emoji.classList.add('grow');
      ring.classList.add('boom');
    }, 3200);

    setTimeout(() => explotar(), 4800);

    setTimeout(() => {
      overlay.classList.remove('visible');
      document.getElementById('heartScreen').classList.remove('active');
      // ✅ FIX: resetear la animación del emoji correctamente
      const emoji = document.getElementById('heartScreenEmoji');
      emoji.classList.remove('grow');
      void emoji.offsetWidth; // fuerza reflow para que la animación pueda volver a correr
      document.getElementById('pulseRing').classList.remove('boom');
      document.getElementById('mono-nino').classList.remove('go','bouncing','wiggle','met');
      document.getElementById('mono-nina').classList.remove('go','bouncing','wiggle','met');
      buildGrid();
      window.location.href = 'index.html';
    }, 6200);
  }

  function explotar() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    for (let i=0;i<48;i++){
      const p = document.createElement('div');
      p.className = 'particula';
      p.textContent = '💜';
      const angle = (i / 48) * 360;
      const dist  = 180 + Math.random() * 220;
      const dx = Math.cos(angle * Math.PI / 180) * dist;
      const dy = Math.sin(angle * Math.PI / 180) * dist;
      const midX = dx * 0.5;
      const midY = dy * 0.5;
      p.style.cssText = `
        left:${cx}px; top:${cy}px;
        --mid:translate(${midX}px,${midY}px);
        --dest:translate(${dx}px,${dy}px);
        animation-duration:${.9+Math.random()*.6}s;
        font-size:${1.2+Math.random()*1.4}rem;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }
  }

  buildGrid();
</script>
</body>
</html>
